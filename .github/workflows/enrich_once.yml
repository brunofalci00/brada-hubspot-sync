name: HubSpot Enrichment (one-shot)

# Sem cron: dispara manual via Actions UI ou gh CLI.
# Automatize cuida do preenchimento na origem pra novos registros.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de execucao"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - verify
          - execute

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Run enrichment
        working-directory: HubSpot/github-actions
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: |
          case "${{ github.event.inputs.mode }}" in
            dry-run) python enrich_once.py --dry-run ;;
            verify)  python enrich_once.py --verify ;;
            execute) python enrich_once.py ;;
          esac

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: enrichment-artifacts
          path: |
            HubSpot/github-actions/errors.csv
            HubSpot/enrichment_report_19abr.md
          if-no-files-found: warn
